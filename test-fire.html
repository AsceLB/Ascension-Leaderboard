<!DOCTYPE html>
<html>
<head>
<style>
body { background: #000; padding: 100px; }
.box {
    width: 600px; height: 50px;
    background: transparent;
    border: 5px solid white;
    filter: url(#manga-fire-filter);
}
</style>
</head>
<body>
<div class="box"></div>
<svg width="0" height="0">
  <filter id="manga-fire-filter" x="-20%" y="-50%" width="140%" height="200%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03 0.1" numOctaves="3" result="noise">
        <animate attributeName="baseFrequency" values="0.03 0.1; 0.04 0.15; 0.03 0.1" dur="2s" repeatCount="indefinite" />
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" />
    <feComponentTransfer>
      <feFuncA type="discrete" tableValues="0 1"/>
    </feComponentTransfer>
  </filter>
</svg>
</body></html>
